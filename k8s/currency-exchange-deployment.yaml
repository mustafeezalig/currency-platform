apiVersion: apps/v1
kind: Deployment
metadata:
  name: currency-exchange
  namespace: currency-prod
  labels:
    app: currency-exchange

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  selector:
    matchLabels:
      app: currency-exchange

  template:
    metadata:
      labels:
        app: currency-exchange

    spec:
      containers:
      - name: currency-exchange

        image: 890319878498.dkr.ecr.ap-south-1.amazonaws.com/currency-exchange:1.0

        imagePullPolicy: Always

        ports:
        - containerPort: 8000

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"

          limits:
            cpu: "500m"
            memory: "1Gi"

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 20

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10